---
- name: 02_migrate | Carregar servicekeys e ler vaults remotos como JSON
  hosts: aapexec
  gather_facts: false
  vars:
    remote_vault_dir: "/opt/NEXT/Devops/ansible/files/secret"
  tasks:
    - name: Carregar arquivo de servicekeys do projeto
      ansible.builtin.include_vars:
        file: ../vars/servicekeys.yml
        name: servicekeys_map

    - name: Armazenar servicekeys em JSON
      ansible.builtin.set_fact:
        servicekeys_json: "{{ servicekeys_map | to_json }}"

    - name: Derivar lista de caminhos de vault únicos
      ansible.builtin.set_fact:
        unique_vault_paths: "{{ servicekeys_map.servicekeys | map(attribute='vault_path') | list | unique }}"

    - name: Ler arquivos de vault remotos via SSH
      ansible.builtin.slurp:
        src: "{{ remote_vault_dir }}/{{ item }}"
      loop: "{{ unique_vault_paths }}"
      register: slurped_vaults
      ignore_errors: true
      no_log: true

    - name: Construir lista JSON dos vaults lidos
      ansible.builtin.set_fact:
        remote_vaults_json: |
          {% set out = [] %}
          {% for r in slurped_vaults.results %}
          {%   if (r is defined) and (r.failed is not defined) and ('content' in r) %}
          {%     set _ = out.append({'vault_path': r.item, 'content_json': (r.content | b64decode | from_yaml | to_json)}) %}
          {%   endif %}
          {% endfor %}
          {{ out }}
      no_log: true


